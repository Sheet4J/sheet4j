<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sheet4j reference renderer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: sans-serif;
        }
        #osmd-container {
            width: 100%;
            background: #ffffff;
        }
        /*
            The status banner is useful when a human loads this page directly,
            but must not add pixels above OSMD's SVG in the automated snapshot
            (the Java driver crops to the OSMD container bounds).
        */
        #status {
            position: fixed;
            bottom: 0;
            right: 0;
            font-size: 11px;
            color: #666;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
    </style>
    <!--
        OpenSheetMusicDisplay bundle. Committed in-repo so tests never touch the
        network. If the file is missing, `renderMusicXml` reports an "osmd:missing"
        status and the JavaFX-side driver skips the reference generation gracefully.
    -->
    <script src="opensheetmusicdisplay.min.js"></script>
</head>
<body>
<div id="osmd-container"></div>
<div id="status">idle</div>
<script>
    // The Java side polls document.title for one of the sentinel values below.
    //   "sheet4j:idle"    – no render in progress
    //   "sheet4j:done"    – render completed successfully
    //   "sheet4j:error:.."– render failed
    //   "sheet4j:missing" – OSMD is not bundled on the classpath
    function setStatus(text) {
        document.title = "sheet4j:" + text;
        var s = document.getElementById("status");
        if (s) { s.textContent = text; }
    }
    setStatus("idle");

    var osmdInstance = null;

    function ensureContainerWidth(widthPx) {
        var container = document.getElementById("osmd-container");
        container.style.width = widthPx + "px";
    }

    window.renderMusicXml = function (xmlString, widthPx) {
        try {
            if (typeof opensheetmusicdisplay === "undefined") {
                setStatus("missing");
                return;
            }
            ensureContainerWidth(widthPx);
            if (osmdInstance === null) {
                osmdInstance = new opensheetmusicdisplay.OpenSheetMusicDisplay(
                    "osmd-container",
                    {
                        autoResize: false,
                        drawTitle: false,
                        drawSubtitle: false,
                        drawComposer: false,
                        drawLyricist: false,
                        drawPartNames: false,
                        pageBackgroundColor: "#FFFFFF"
                    }
                );
            }
            var promise = osmdInstance.load(xmlString);
            promise.then(function () {
                try {
                    osmdInstance.render();
                    // OSMD lays out into an <svg>, but the pixels are not yet
                    // guaranteed to be on screen until the browser has run a
                    // paint frame. Two requestAnimationFrame calls straddle a
                    // full paint cycle; the extra setTimeout is a belt-and-
                    // braces buffer for slow WebKit builds.
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            setTimeout(function () {
                                // Publish the actual OSMD content bounds so the
                                // Java side can crop the WebView snapshot to a
                                // tight box (avoiding trailing whitespace and
                                // uncovering content taller than the viewport).
                                var container = document.getElementById("osmd-container");
                                var rect = container.getBoundingClientRect();
                                var svg = container.querySelector("svg");
                                var w = Math.ceil(rect.width);
                                var h = Math.ceil(rect.height);
                                if (svg) {
                                    var sr = svg.getBoundingClientRect();
                                    w = Math.max(w, Math.ceil(sr.width));
                                    h = Math.max(h, Math.ceil(sr.height));
                                }
                                window.__sheet4jContentWidth = w;
                                window.__sheet4jContentHeight = h;
                                setStatus("done");
                            }, 100);
                        });
                    });
                } catch (renderErr) {
                    setStatus("error:render:" + renderErr);
                }
            }).catch(function (loadErr) {
                setStatus("error:load:" + loadErr);
            });
        } catch (e) {
            setStatus("error:exception:" + e);
        }
    };
</script>
</body>
</html>
